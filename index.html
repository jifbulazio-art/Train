<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- deploy-touch: 2026-03-29T00:00:00-03:00 -->
<title>Rutina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0f; --s1:#1a1a1c; --s2:#232325; --s3:#2c2c2f;
  --b0:rgba(255,255,255,.05); --b1:rgba(255,255,255,.10); --b2:rgba(255,255,255,.16);
  --tx:#f0f0ef; --tx2:#9a9a96; --tx3:#5a5a58;
  --push:#e85d3a; --pull:#4a9eff; --legs:#4ecf7a; --combo:#b06bff; --free:#ffb347; --warm:#f5c518; --rest:#5a5a58;
  --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:520px;margin:0 auto;min-height:100dvh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'DM Sans',sans-serif}

/* â”€â”€ NAV â”€â”€ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;flex-shrink:0}
.nav-logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx3);letter-spacing:.1em}
.nav-tabs{display:flex;gap:2px;background:var(--s2);border-radius:20px;padding:3px}
.ntab{padding:5px 12px;font-size:12px;border:none;background:transparent;color:var(--tx2);border-radius:16px;transition:all .18s}
.ntab.on{background:var(--s3);color:var(--tx);font-weight:500}

/* â”€â”€ DAY ROW â”€â”€ */
.day-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:10px 16px 0;flex-shrink:0}
.dp{padding:8px 2px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--b1);background:transparent;color:var(--tx2);text-align:center;transition:all .18s}
.dp.on{color:#0e0e0f;font-weight:700}
.dp[data-d="0"].on{background:var(--push);border-color:var(--push)}
.dp[data-d="1"].on{background:var(--pull);border-color:var(--pull)}
.dp[data-d="2"].on{background:var(--legs);border-color:var(--legs)}
.dp[data-d="3"].on{background:var(--combo);border-color:var(--combo)}
.dp[data-d="4"].on{background:var(--free);border-color:var(--free)}
.dp[data-d="5"].on,.dp[data-d="6"].on{background:var(--s3);border-color:var(--b2);color:var(--tx)}

/* â”€â”€ VIEWS â”€â”€ */
.view{display:none;flex:1;overflow-y:auto;padding:0 16px 90px}
.view.on{display:block}
.sticky-top{position:sticky;top:0;z-index:8;background:var(--bg);display:flex;flex-direction:column;padding-top:10px}
.sticky-gap{padding-bottom:12px}

/* â”€â”€ DAY HEADER â”€â”€ */
.dh{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.dh-title{font-size:22px;font-weight:600;letter-spacing:-.02em;flex:1}
.chip{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:20px;border:none;white-space:nowrap;cursor:pointer}
.chip-push{color:var(--push);background:rgba(232,93,58,.12);border:1px solid rgba(232,93,58,.22)}
.chip-pull{color:var(--pull);background:rgba(74,158,255,.12);border:1px solid rgba(74,158,255,.22)}
.chip-legs{color:var(--legs);background:rgba(78,207,122,.12);border:1px solid rgba(78,207,122,.22)}
.chip-combo{color:var(--combo);background:rgba(176,107,255,.12);border:1px solid rgba(176,107,255,.22)}
.chip-free{color:var(--free);background:rgba(255,179,71,.12);border:1px solid rgba(255,179,71,.22)}
.chip-rest{color:var(--tx3);background:transparent;border:1px solid var(--b1)}
.chip-warm{color:var(--warm);background:rgba(245,197,24,.10);border:1px solid rgba(245,197,24,.22)}
.chip-run{color:var(--legs);background:rgba(78,207,122,.10);border:1px solid rgba(78,207,122,.22)}
.chip-run.off{color:var(--tx3);background:transparent;border:1px solid var(--b1)}

/* â”€â”€ EXERCISE LIST â”€â”€ */
.ex-list{display:flex;flex-direction:column;gap:6px}

/* warm group */
.warm-group{border:1px solid rgba(245,197,24,.25);border-radius:var(--r);overflow:hidden;margin-bottom:4px;background:rgba(245,197,24,.04)}
.warm-group-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--warm);padding:5px 12px;letter-spacing:.07em;opacity:.8}

/* super group */
.super-group{border:1px solid;border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.super-group-label{font-size:10px;font-family:'DM Mono',monospace;padding:5px 12px;letter-spacing:.07em}

/* exercise card */
.exc{display:flex;align-items:flex-start;gap:10px;padding:0;background:transparent;cursor:pointer;position:relative;border-bottom:1px solid var(--b0)}
.exc:last-child{border-bottom:none}
.exc.standalone{border-radius:var(--r);border:1px solid var(--b1);margin-bottom:4px}
.exc:active{opacity:.75}
.exc.swiping{opacity:1}
.exc-body{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;position:relative;z-index:2;width:100%;background:var(--bg);transition:transform .18s ease}
.exc.standalone .exc-body{border-radius:var(--r)}
.exc-swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 10px;pointer-events:none;z-index:1;opacity:0;transition:opacity .14s ease}
.exc.swiping .exc-swipe-bg{opacity:1}
.sw-act{font-size:10px;font-family:'DM Mono',monospace;padding:6px 9px;border-radius:999px;border:1px solid var(--b1);background:rgba(255,255,255,.03);color:var(--tx2)}
.sw-act.ss{border-color:rgba(176,107,255,.35);color:#d9c3ff;background:rgba(176,107,255,.14)}
.sw-act.del{border-color:rgba(232,93,58,.35);color:var(--push);background:rgba(232,93,58,.14)}
.exc-thumb{width:42px;height:42px;border-radius:9px;background:var(--s2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--b1)}
.exc-thumb img{width:100%;height:100%;object-fit:cover}
.exc-info{flex:1;min-width:0}
.exc-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.exc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exc-meta{display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--tx2);margin-top:4px;font-family:'DM Mono',monospace}
.exc-plan{color:var(--tx2)}
.exc-progress-row{display:flex;flex-wrap:wrap;gap:5px}
.exc-progress-chip{padding:2px 7px;border:1px solid var(--b1);background:rgba(255,255,255,.02);color:var(--tx2);font-size:10px;border-radius:999px}
.exc-progress-chip.done{color:var(--legs);border-color:rgba(78,207,122,.35);background:rgba(78,207,122,.08)}
.exc-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-top:1px}
.exc-ss{background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:10px;font-family:'DM Mono',monospace;padding:6px 9px;border-radius:999px;line-height:1}
.exc-ss.on{border-color:rgba(176,107,255,.35);color:#d9c3ff;background:rgba(176,107,255,.14)}
.exc-pending{box-shadow:inset 0 0 0 1px rgba(176,107,255,.35)}
.exc-del{background:transparent;border:1px solid var(--b1);color:var(--tx3);font-size:15px;padding:4px 6px;line-height:1;border-radius:7px;flex-shrink:0}

/* drag handle */
.drag-handle{position:relative;width:12px;height:22px;cursor:grab;flex-shrink:0;touch-action:none;opacity:.8;margin-top:10px}
.drag-handle::before{content:'';position:absolute;left:1px;top:4px;width:2px;height:2px;border-radius:50%;background:var(--tx3);box-shadow:0 4px 0 var(--tx3),0 8px 0 var(--tx3),0 12px 0 var(--tx3),6px 0 0 var(--tx3),6px 4px 0 var(--tx3),6px 8px 0 var(--tx3),6px 12px 0 var(--tx3)}
.drag-handle:active{cursor:grabbing}
.exc.dragging{opacity:.4}
.exc.drag-over{border-top:2px solid var(--pull)}

.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:transparent;border:1px dashed var(--b2);border-radius:var(--r);color:var(--tx3);font-size:13px;margin-top:8px}
.add-ex-btn:active{background:var(--s1)}
.week-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.week-action-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:transparent;border:1px dashed var(--b2);border-radius:var(--r);color:var(--tx3);font-size:13px}
.week-action-btn:active{background:var(--s1)}

/* â”€â”€ MODALS â”€â”€ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;backdrop-filter:blur(5px);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:93dvh;display:flex;flex-direction:column;overflow:hidden;animation:up .22s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.sheet-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b0);flex-shrink:0}
.sheet-title{font-size:15px;font-weight:600}
.sheet-close{background:var(--s2);border:none;color:var(--tx2);width:26px;height:26px;border-radius:50%;font-size:17px;display:flex;align-items:center;justify-content:center}
.sheet-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}

/* â”€â”€ ADD EXERCISES SHEET â”€â”€ */
.search-row{position:relative}
.search-row input{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:14px;outline:none}
.search-row input::placeholder{color:var(--tx3)}
.search-icon{display:none}
.thumb-ph{width:18px;height:18px;border-radius:50%;border:2px solid var(--tx3);opacity:.45;display:inline-block}

/* filter chips â€” wrap into multiple rows */
.filter-block{display:flex;flex-direction:column;gap:6px}
.filter-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;padding:0}
.fchip{padding:5px 11px;border-radius:20px;font-size:12px;border:1px solid var(--b1);background:transparent;color:var(--tx2);white-space:nowrap}
.fchip.on{background:var(--s3);color:var(--tx);border-color:var(--b2)}

.opts-list{flex:1;overflow-y:auto;margin:0 -16px}
.opts-grp-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;padding:10px 16px 3px}
.opt-row{display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--b0);min-height:52px;cursor:pointer}
.opt-row:active{background:var(--s2)}
.opt-row.on{background:var(--s2)}
.opt-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt-row.on .opt-check{background:var(--tx);border-color:var(--tx)}
.opt-row.on .opt-check::after{content:'';width:8px;height:8px;background:var(--bg);border-radius:50%}
.opt-thumb{width:32px;height:32px;border-radius:6px;background:var(--s3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px}
.opt-thumb img{width:100%;height:100%;object-fit:cover}
.opt-name{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opt-inputs{display:flex;align-items:center;gap:4px;flex-shrink:0}
.opt-inputs input{width:36px;background:var(--s3);border:1px solid var(--b1);border-radius:6px;padding:5px 3px;color:var(--tx);font-size:12px;font-family:'DM Mono',monospace;outline:none;text-align:center}
.opt-inputs .ri{width:46px}
.opt-inputs .sep{font-size:11px;color:var(--tx3)}
.opt-inputs select{background:var(--s3);border:1px solid var(--b1);border-radius:6px;padding:5px 2px;color:var(--tx2);font-size:11px;font-family:'DM Mono',monospace;outline:none;width:40px}

.confirm-bar{padding:10px 16px;border-top:1px solid var(--b0);flex-shrink:0;display:flex;gap:8px;align-items:center;background:var(--s1)}
.super-tog{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);flex:1}
.super-tog input{accent-color:var(--combo);width:15px;height:15px}
.n-sel{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3)}
.btn-add{background:var(--tx);color:var(--bg);border:none;padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;white-space:nowrap}
.btn-add:disabled{opacity:.3}

/* â”€â”€ DETAIL SHEET â”€â”€ */
.detail-img{width:min(100%,220px);aspect-ratio:1;background:var(--s2);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:0 auto}
.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-img-ph{font-size:12px;color:var(--tx3);font-family:'DM Mono',monospace}
.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:450;display:none;align-items:center;justify-content:center;padding:20px}
.zoom-overlay.on{display:flex}
.zoom-card{width:min(92vw,520px);aspect-ratio:1;background:var(--s1);border:1px solid var(--b1);border-radius:22px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.zoom-card img{width:100%;height:100%;object-fit:contain;background:var(--s2)}
.zoom-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;border-radius:50%;background:rgba(14,14,15,.82);color:var(--tx);font-size:18px;display:flex;align-items:center;justify-content:center}
.thumb-tap{cursor:zoom-in}
.detail-ex-name{font-size:18px;font-weight:600;letter-spacing:-.02em}
.detail-ex-sub{font-size:12px;color:var(--tx2);font-family:'DM Mono',monospace;margin-top:2px}
.sets-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3);letter-spacing:.07em}
.plan-grid{display:grid;grid-template-columns:80px 1fr 72px;gap:8px}
.plan-grid input,.plan-grid select{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:9px 8px;color:var(--tx);font-size:13px;outline:none;min-width:0}
.set-row{display:flex;align-items:center;gap:6px}
.set-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3);width:32px;text-align:right;flex-shrink:0}
.set-row input{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:8px 5px;color:var(--tx);font-size:13px;outline:none;text-align:center;min-width:0}
.set-unit{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:8px 3px;color:var(--tx2);font-size:11px;font-family:'DM Mono',monospace;outline:none;flex-shrink:0;width:48px;text-align:center}
.set-del{background:none;border:none;color:var(--tx3);font-size:17px;padding:0 3px;flex-shrink:0}
.link-btn{font-size:13px;color:var(--tx2);background:none;border:none;padding:2px 0;text-align:left}
.btn-save{width:100%;padding:13px;background:var(--legs);color:var(--bg);border:none;border-radius:var(--rs);font-size:14px;font-weight:600}
.btn-secondary{width:100%;padding:11px;background:transparent;color:var(--tx2);border:1px solid var(--b1);border-radius:var(--rs);font-size:13px}

/* â”€â”€ TYPE PICKER â”€â”€ */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end;justify-content:center}
.picker-overlay.on{display:flex}
.picker-sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:18px 16px 36px;animation:up .2s ease}
.picker-title{font-size:12px;color:var(--tx2);font-family:'DM Mono',monospace;text-align:center;margin-bottom:14px;letter-spacing:.07em}
.picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.picker-opt{padding:12px 6px;border-radius:var(--rs);font-size:13px;font-weight:500;border:1px solid var(--b1);background:transparent;color:var(--tx2);text-align:center}

/* â”€â”€ EXERCISE MGMT VIEW â”€â”€ */
.mgmt-section{margin-bottom:28px}
.mgmt-section-title{font-size:12px;font-family:'DM Mono',monospace;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.mgmt-search{margin:12px 0 18px}
.mgmt-search input{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none}
.mgmt-search input::placeholder{color:var(--tx3)}
.mgmt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mgmt-search.sticky-gap{margin-top:0;margin-bottom:0}
.mgmt-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);margin-bottom:6px;cursor:pointer}
.mgmt-item:active{opacity:.75}
.mgmt-thumb{width:40px;height:40px;border-radius:7px;background:var(--s2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.mgmt-thumb img{width:100%;height:100%;object-fit:cover}
.mgmt-info{flex:1;min-width:0}
.mgmt-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgmt-sub{font-size:11px;color:var(--tx2);font-family:'DM Mono',monospace;margin-top:2px}
.mgmt-link{font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgmt-arrow{color:var(--tx3);font-size:16px}
.btn-outline{padding:10px 16px;background:transparent;border:1px solid var(--b2);border-radius:var(--rs);font-size:13px;color:var(--tx);white-space:nowrap}
.btn-danger-outline{padding:10px 16px;background:transparent;border:1px solid rgba(232,93,58,.35);border-radius:var(--rs);font-size:13px;color:var(--push)}

/* routine cards */
.routine-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer}
.routine-card:active{opacity:.75}
.rc-name{font-size:14px;font-weight:600;margin-bottom:4px}
.rc-sub{font-size:12px;color:var(--tx2);font-family:'DM Mono',monospace}

/* form */
.form-field{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3);letter-spacing:.07em}
.form-input{padding:10px 13px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:14px;outline:none;width:100%}
.form-input::placeholder{color:var(--tx3)}
.form-select{padding:10px 13px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:14px;outline:none;width:100%}
.form-select option{background:var(--s2)}
.field-link{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--b1);color:var(--tx2);
  font-size:11px;font-family:'DM Mono',monospace;padding:9px 12px;
  border-radius:999px;text-align:left
}
.field-link::before{
  content:'+';display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;background:var(--s3);color:var(--tx);
  font-size:13px;line-height:1
}
.field-link.open::before{content:'-'}
.field-link-wrap{margin-top:-2px;display:flex}
.img-upload-area{display:flex;gap:8px}
.img-upload-area input{flex:1;padding:10px 13px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none}
.img-upload-area input::placeholder{color:var(--tx3)}
.img-preview{width:100%;height:120px;background:var(--s2);border-radius:var(--rs);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-top:8px}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview-ph{font-size:12px;color:var(--tx3);font-family:'DM Mono',monospace}
.btn-full{width:100%;padding:13px;background:var(--tx);color:var(--bg);border:none;border-radius:var(--rs);font-size:14px;font-weight:600}
.btn-row{display:flex;gap:8px}

const NAME_STOPWORDS=new Set(['a','al','and','con','da','das','de','del','des','do','dos','e','el','en','for','la','las','los','of','or','para','por','the','to','y']);

function titleCaseEs(text=''){
  const words=text.trim().split(/\s+/).filter(Boolean);
  return words.map((w,i)=>{
    const low=w.toLowerCase();
    if(i>0 && NAME_STOPWORDS.has(low)) return low;
    if(/^[A-Z0-9]{2,}$/.test(w)) return w;
    return low.replace(/(^|[-/])([a-záéíóúüñ])/g,(m,p1,p2)=>p1+p2.toUpperCase());
  }).join(' ');
}

function normalizeExerciseName(name=''){
  let n=(name||'').replace(/\s+/g,' ').trim();
  if(!n) return n;

  const lower=n.toLowerCase();
  const hasPush=/\bpush[\s-]*ups?\b/i.test(lower) || /\bpush[\s-]*up\b/i.test(lower);
  const hasPull=/\bpull[\s-]*ups?\b/i.test(lower) || /\bpull[\s-]*up\b/i.test(lower);

  if(hasPush){
    const rest=n.replace(/\bpush[\s-]*ups?\b/ig,'').replace(/\bpush[\s-]*up\b/ig,'').replace(/\s+/g,' ').trim();
    n=`Push Ups${rest?` ${titleCaseEs(rest)}`:''}`;
  }else if(hasPull){
    const rest=n.replace(/\bpull[\s-]*ups?\b/ig,'').replace(/\bpull[\s-]*up\b/ig,'').replace(/\s+/g,' ').trim();
    n=`Pull Ups${rest?` ${titleCaseEs(rest)}`:''}`;
  }else{
    n=titleCaseEs(n);
  }
  return n.replace(/\s+/g,' ').trim();
}

function normalizeAllExerciseNames(){
  let changed=false;

  Object.keys(BUILTIN).forEach(type=>{
    Object.keys(BUILTIN[type]).forEach(muscle=>{
      BUILTIN[type][muscle]=BUILTIN[type][muscle].map(n=>{
        const nn=normalizeExerciseName(n);
        if(nn!==n) changed=true;
        return nn;
      });
    });
  });

  const renameMap={};
  exercises.forEach(ex=>{
    const old=ex.name||'';
    const nn=normalizeExerciseName(old);
    if(nn && nn!==old){
      renameMap[old]=nn;
      ex.name=nn;
      changed=true;
    }
    if(ex.replaceOf){
      const ro=normalizeExerciseName(ex.replaceOf);
      if(ro!==ex.replaceOf){ex.replaceOf=ro;changed=true;}
    }
  });

  exercises.forEach(ex=>{
    if(ex.hidden && ex.name){
      const nn=normalizeExerciseName(ex.name);
      if(nn!==ex.name){ex.name=nn;changed=true;}
    }
  });

  Object.keys(weekData).forEach(di=>{
    (weekData[di]||[]).forEach(ex=>{
      const nn=normalizeExerciseName(ex.name||'');
      if(nn && nn!==ex.name){ex.name=nn;changed=true;}
    });
  });

  routines.forEach(r=>{
    (r.items||[]).forEach(ex=>{
      const nn=normalizeExerciseName(ex.name||'');
      if(nn && nn!==ex.name){ex.name=nn;changed=true;}
    });
  });

  return changed;
}

function inferExerciseContext(ex){
  const name=(ex.name||'').toLowerCase();
  const muscle=(ex.muscle||'').toLowerCase();
  const type=(ex.type||'').toLowerCase();

  if(muscle.includes('aerobico') || /jump|burpee|mountain climber|skipping|trote|high knees|jump rope|butt kicks/.test(name)) return 'aerobico';
  if(muscle.includes('movilidad') || /stretch|movilidad|rotacion|rotaciones|circulos|cat-cow|paloma|jefferson|cossack|pass-through|thorac/.test(name)) return 'movilidad';
  if(/polea|maquina|machine|pec deck|cable|crossover|pulldown|pull-down|remo sentado|seated row|machine row|assisted|leg extension|extension de cuadriceps|leg curl|curl femoral|standing leg curl|hip abduction|hip adduction|abduccion|adduction|glute drive|seated calf raise|standing calf raise|machine calf raise|hack squat|pendulum squat|belt squat|smith machine|rear delt machine|reverse pec deck|chest press|shoulder press/.test(name)) return 'gym';
  if(/mancuerna|mancuernas|dumbbell|kettlebell|goblet|arnold|peso muerto|back squat|front squat|press militar con barra|press banca con barra|remo con barra|pullover/.test(name)) return 'peso-libre';
  if(type==='free' || type==='combo' || /push-up|push up|pull-up|pull up|chin-up|chin up|dead hang|front lever|back lever|handstand|planche|plancha|plank|l-sit|dragon flag|muscle-up|muscle up|skin the cat|toes to bar|wall walk|dips|australian|scapular|crow stand/.test(name)) return 'calistenia';
  return 'peso-libre';
}

function normalizeAllExerciseModalities(){
  let changed=false;
  exercises.forEach(ex=>{
    if(ex.hidden) return;
    const current=(ex.modality||'').trim();
    const secondary=(ex.modalitySecondary||'').trim();
    if(!current){
      if(secondary){
        ex.modalitySecondary='';
        changed=true;
      }
      return;
    }
    const inferred=inferExerciseContext({...ex,modality:''});
    let next=current;
    if(current==='peso-libre' && inferred==='calistenia') next='calistenia';
    if(current==='calistenia' && (inferred==='peso-libre' || inferred==='gym')) next=inferred;
    if(next!==ex.modality){
      ex.modality=next;
      changed=true;
    }
    if(secondary && secondary===next){
      ex.modalitySecondary='';
      changed=true;
    }
  });
  return changed;
}

function normalizeExerciseKey(name=''){
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[-_]/g,' ')
    .replace(/[+]/g,' plus ')
    .replace(/[()]/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\bpush\s+ups?\b/g,'push up')
    .replace(/\bpull\s+ups?\b/g,'pull up')
    .replace(/\s+/g,' ')
    .trim();
}

function slugifyExerciseName(name=''){
  const key=normalizeExerciseKey(name);
  return key.replace(/\s+/g,'-');
}

let trustedExerciseLinksIndex=null;
function getTrustedExerciseLinksIndex(){
  if(trustedExerciseLinksIndex) return trustedExerciseLinksIndex;
  const idx={};
  Object.entries(TRUSTED_EXERCISE_LINKS).forEach(([rawKey,url])=>{
    const norm=normalizeExerciseKey(rawKey);
    if(norm && url) idx[norm]=url;
  });
  trustedExerciseLinksIndex=idx;
  return trustedExerciseLinksIndex;
}

function getStrengthLevelThumb(name,type){
  const key=normalizeExerciseKey(name);
  const idx=getTrustedExerciseLinksIndex();
  return idx[key]||null;
}

async function sbLoad(){
  if(syncState.loading) return;
  syncState.loading=true;
  lsLoad();
  try{
    const ctl=new AbortController();
    const to=setTimeout(()=>ctl.abort(),8000);
    const r=await fetch(SB+'/rest/v1/rutina?select=id,data,updated_at',{headers:SH,signal:ctl.signal});
    clearTimeout(to);
    if(!r.ok) throw 0;
    const rows=await r.json();
    const localSnapshot=serializeSyncState();
    const localPending=localStorage.getItem(SYNC_PENDING_KEY)==='1';
    const remoteData={week:{},daycfg:{},exercises:[],routines:[]};
    const seen=new Set();
    let remoteMaxMs=0;
    rows.forEach(row=>{
      if(row.id==='week'){ remoteData.week=row.data||{}; seen.add('week'); }
      if(row.id==='daycfg'){ remoteData.daycfg=row.data||{}; seen.add('daycfg'); }
      if(row.id==='exercises'){ remoteData.exercises=row.data||[]; seen.add('exercises'); }
      if(row.id==='routines'){ remoteData.routines=row.data||[]; seen.add('routines'); }
      const ms=Date.parse(row.updated_at||'');
      if(Number.isFinite(ms)) remoteMaxMs=Math.max(remoteMaxMs,ms);
    });
    const remoteMissing=['week','daycfg','exercises','routines'].some(id=>!seen.has(id));
    const keepLocalAndRestoreRemote=!localPending && remoteMissing && hasMeaningfulLocalData(localSnapshot);
    const localEditMs=parseInt(localStorage.getItem(SYNC_LOCAL_EDIT_KEY)||'0',10)||0;
    const shouldKeepLocalPending=localPending && localEditMs>remoteMaxMs;

    if(!keepLocalAndRestoreRemote && !shouldKeepLocalPending){
      weekData=remoteData.week;
      dayCfg=remoteData.daycfg;
      exercises=remoteData.exercises;
      routines=remoteData.routines;
      for(let i=0;i<7;i++) if(!dayCfg[i]) dayCfg[i]={...DEF_DAY[i]};
      snapshotRemoteFromData(remoteData);
      syncState.pending=false;
      localStorage.setItem(SYNC_PENDING_KEY,'0');
      return;
    }

    snapshotRemoteFromData(remoteData);
    syncState.pending=true;
    localStorage.setItem(SYNC_PENDING_KEY,'1');
    scheduleSync(700);
  }catch(e){
    showSyncFallbackToast();
  }finally{
    syncState.loading=false;
  }
}

function showSyncFallbackToast(){
  const now=Date.now();
  if(now-syncState.lastToastAt<12000) return;
  syncState.lastToastAt=now;
  toast('sin conexion, usando local',false);
}

function serializeStateParts(parts={}){
  const normalizedDayCfg=(parts.daycfg&&Object.keys(parts.daycfg).length)
    ? parts.daycfg
    : Object.fromEntries(Array.from({length:7},(_,i)=>[i,{...DEF_DAY[i]}]));
  return {
    week:JSON.stringify(parts.week||{}),
    daycfg:JSON.stringify(normalizedDayCfg),
    exercises:JSON.stringify(parts.exercises||[]),
    routines:JSON.stringify(parts.routines||[]),
  };
}

function serializeSyncState(){
  return serializeStateParts({week:weekData,daycfg:dayCfg,exercises,routines});
}

function hasMeaningfulLocalData(snapshot){
  const empty=serializeStateParts({week:{},daycfg:{},exercises:[],routines:[]});
  return snapshot.week!==empty.week || snapshot.exercises!==empty.exercises || snapshot.routines!==empty.routines;
}

function snapshotRemoteFromData(parts){
  syncState.lastRemote=serializeStateParts(parts);
}

function snapshotRemoteFromCurrent(){
  snapshotRemoteFromData({week:weekData,daycfg:dayCfg,exercises,routines});
}

function scheduleSync(delay=SYNC_IDLE_MS){
  if(syncState.timer) clearTimeout(syncState.timer);
  syncState.timer=setTimeout(()=>flushSync(),delay);
}

async function flushSync({keepalive=false}={}){
  if(!syncState.pending || syncState.inFlight) return;
  syncState.inFlight=true;
  if(syncState.timer){clearTimeout(syncState.timer);syncState.timer=null;}
  lsSave();
  try{
    const serialized=serializeSyncState();
    const changedIds=['week','daycfg','exercises','routines'].filter(id=>serialized[id]!==syncState.lastRemote[id]);
    if(!changedIds.length){
      syncState.pending=false;
      localStorage.setItem(SYNC_PENDING_KEY,'0');
      return;
    }
    const payload=JSON.stringify(changedIds.map(id=>({
      id,
      data:JSON.parse(serialized[id]),
      updated_at:new Date().toISOString()
    })));
    const resp=await fetch(SB+'/rest/v1/rutina',{method:'POST',headers:SH,body:payload,keepalive});
    if(!resp.ok) throw 0;
    changedIds.forEach(id=>{syncState.lastRemote[id]=serialized[id];});
    syncState.pending=false;
    localStorage.setItem(SYNC_PENDING_KEY,'0');
  }catch(e){
    syncState.pending=true;
    localStorage.setItem(SYNC_PENDING_KEY,'1');
    scheduleSync(SYNC_RETRY_MS);
    showSyncFallbackToast();
  }finally{
    syncState.inFlight=false;
  }
}

function buildExListHTML(di,exs){
  if(!exs||!exs.length) return '';
  const sgIds=[...new Set(exs.filter(e=>e.superGroup).map(e=>e.superGroup))];
  const sgColor={};sgIds.forEach((id,i)=>sgColor[id]=SC[i%SC.length]);
  let html='';
  const doneSuper=new Set();
  for(let i=0;i<exs.length;i++){
    const ex=exs[i];
    const exType=ex.type||getExType(ex.name);
    if(ex.superGroup){
      if(doneSuper.has(ex.superGroup)) continue;
      doneSuper.add(ex.superGroup);
      const col=sgColor[ex.superGroup];
      const grp=exs.map((e,idx)=>({e,idx})).filter(({e})=>e.superGroup===ex.superGroup);
      html+=`<div class="super-group" style="border-color:${col.b};background:${col.bg}">
        <div class="super-group-label" style="color:${col.l}">SUPERSERIE</div>
        ${grp.map(({e,idx})=>excHTML(e,di,idx,true)).join('')}
      </div>`;
      continue;
    }
    if(exType==='warm'){
      let j=i;
      while(j<exs.length&&!exs[j].superGroup&&((exs[j].type||getExType(exs[j].name))==='warm')) j++;
      const warmGroup=exs.slice(i,j).map((e,k)=>({e,idx:i+k}));
      html+=`<div class="warm-group">
        <div class="warm-group-label">CALENTAMIENTO</div>
        ${warmGroup.map(({e,idx})=>excHTML(e,di,idx,true)).join('')}
      </div>`;
      i=j-1;
      continue;
    }
    html+=excHTML(ex,di,i,false);
  }
  return html;
}

function getExType(name){
  // check custom exercises first
  const c=exercises.find(e=>!e.hidden && e.name===name);
  if(c) return c.type;
  // check builtin
  for(const [type,groups] of Object.entries(BUILTIN)){
    for(const list of Object.values(groups)){
      if(list.includes(name)) return type;
    }
  }
  return 'free';
}

  const arr=weekData[di]||[];

    if(!source){pendingSuperLink=null;renderDay();return;}
    const groupId=ex.superGroup||source.superGroup||('sg_'+Date.now());

const SWIPE_MAX=92;
const SWIPE_TRIGGER=62;
let excSwipeState={active:false,el:null,body:null,startX:0,startY:0,dx:0,di:null,i:null,lock:'',moved:false};
function resetExcSwipeState(){
  excSwipeState={active:false,el:null,body:null,startX:0,startY:0,dx:0,di:null,i:null,lock:'',moved:false};
}
function excTouchStart(ev,di,i){
  if(!ev.touches || ev.touches.length!==1) return;
  if(ev.target.closest('.drag-handle')) return;
  const el=ev.currentTarget;
  const body=el.querySelector('.exc-body');
  if(!body) return;
  const t=ev.touches[0];
  excSwipeState={active:true,el,body,startX:t.clientX,startY:t.clientY,dx:0,di,i,lock:'',moved:false};
  body.style.transition='none';
}
function excTouchMove(ev){
  if(!excSwipeState.active) return;
  const t=ev.touches[0];
  const dx=t.clientX-excSwipeState.startX;
  const dy=t.clientY-excSwipeState.startY;
  if(!excSwipeState.lock){
    if(Math.abs(dx)>8 && Math.abs(dx)>Math.abs(dy)) excSwipeState.lock='x';
    else if(Math.abs(dy)>8) excSwipeState.lock='y';
  }
  if(excSwipeState.lock!=='x') return;
  ev.preventDefault();
  const clamped=Math.max(-SWIPE_MAX,Math.min(SWIPE_MAX,dx));
  excSwipeState.dx=clamped;
  excSwipeState.moved=true;
  excSwipeState.el.classList.add('swiping');
  excSwipeState.body.style.transform=`translateX(${clamped}px)`;
}
function excTouchEnd(){
  if(!excSwipeState.active) return;
  const {el,body,dx,di,i,moved}=excSwipeState;
  body.style.transition='transform .18s ease';
  body.style.transform='translateX(0px)';
  if(el) el.classList.remove('swiping');
  if(moved && Math.abs(dx)>=SWIPE_TRIGGER){
    if(dx>0) removeFromDay(di,i);
    else supersetAction(di,i);
    if(el){
      el.dataset.swiped='1';
      setTimeout(()=>{ if(el) delete el.dataset.swiped; },260);
    }
  }
  setTimeout(()=>{ if(body) body.style.transition=''; },220);
  resetExcSwipeState();
}
function excTap(ev,di,i){
  const el=ev.currentTarget;
  if(el?.dataset?.swiped==='1') return;
  openDetail(di,i);
}

function dragStart(e,di,idx){
  dragSrc=e.currentTarget;dragSrcDay=di;dragSrcIdx=idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e,di,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.exc').forEach(el=>el.classList.remove('drag-over'));
  if(dragSrcIdx!==idx) e.currentTarget.classList.add('drag-over');
}
function dragDrop(e,di,idx){
  e.preventDefault();
  if(dragSrcDay===di&&dragSrcIdx!==idx){

}
function setAddFilter(f){addFilter=f;renderAddFilters();renderAddOpts();}
function setAddContextFilter(f){addContextFilter=f;renderAddFilters();renderAddOpts();}

function getAllExercises(){
  const result=[];
  const consumedCustomIds=new Set();
  const hiddenNames=new Set(exercises.filter(e=>e.hidden).map(e=>e.name));
  const exactByName={};
  const replaceBySource={};
  const seenExerciseNames=new Set();
  const markSeenExerciseName=(name='')=>{
    const k=normalizeExerciseKey(name||'');
    if(!k) return true;
    if(seenExerciseNames.has(k)) return false;
    seenExerciseNames.add(k);
    return true;
  };

  exercises.forEach(ex=>{
    if(ex.hidden) return;
    if(ex.replaceOf) replaceBySource[ex.replaceOf]=ex;
    else exactByName[ex.name]=ex;
  });

  Object.entries(BUILTIN).forEach(([type,groups])=>{
    Object.entries(groups).forEach(([muscle,names])=>{
      names.forEach(name=>{
        if(hiddenNames.has(name)) return;
        const replaced=replaceBySource[name];
        if(replaced){
          consumedCustomIds.add(replaced.id);
          if(!markSeenExerciseName(replaced.name)) return;
          result.push({
            name:replaced.name,
            type:replaced.type||type,
            muscle:replaced.muscle||muscle,
            muscleSecondary:replaced.muscleSecondary||'',
            modality:replaced.modality||'',
            modalitySecondary:replaced.modalitySecondary||'',
            imageUrl:replaced.imageUrl||getStrengthLevelThumb(replaced.name,replaced.type||type),
            imageData:replaced.imageData||null,
          });
          return;
        }
        const custom=exactByName[name];
        if(custom){
          consumedCustomIds.add(custom.id);
          if(!markSeenExerciseName(custom.name)) return;
          result.push({
            name:custom.name,
            type:custom.type||type,
            muscle:custom.muscle||muscle,
            muscleSecondary:custom.muscleSecondary||'',
            modality:custom.modality||'',
            modalitySecondary:custom.modalitySecondary||'',
            imageUrl:custom.imageUrl||getStrengthLevelThumb(custom.name,custom.type||type),
            imageData:custom.imageData||null,
          });
          return;
        }
        if(!markSeenExerciseName(name)) return;
        result.push({name,type,muscle,muscleSecondary:'',modality:'',modalitySecondary:'',imageUrl:getStrengthLevelThumb(name,type),imageData:null});
      });
    });
  });

  exercises.forEach(ex=>{
    if(ex.hidden) return;
    if(consumedCustomIds.has(ex.id)) return;
    if(!markSeenExerciseName(ex.name)) return;
    const type=ex.type||'free';
    result.push({name:ex.name,type,muscle:ex.muscle||'',muscleSecondary:ex.muscleSecondary||'',modality:ex.modality||'',modalitySecondary:ex.modalitySecondary||'',imageUrl:ex.imageUrl||getStrengthLevelThumb(ex.name,type),imageData:ex.imageData||null});
  });
  return result.sort((a,b)=>(a.name||'').localeCompare((b.name||''),'es',{sensitivity:'base'}));
}

function getExerciseContext(ex){
  const inferred=inferExerciseContext(ex);
  if(!ex.modality) return inferred;
  const manual=(ex.modality||'').trim();
  if(manual==='peso-libre' && inferred==='calistenia') return 'calistenia';
  if(manual==='calistenia' && (inferred==='peso-libre' || inferred==='gym')) return inferred;
  return manual;
}

function getExerciseContexts(ex){
  const primary=getExerciseContext(ex);
  const secondary=(ex.modalitySecondary||'').trim();
  if(!secondary || secondary===primary) return [primary];
  return [primary,secondary];
}

function getExerciseContextLabel(ex){
  const labels=getExerciseContexts(ex).map(id=>(CONTEXT_FILTERS.find(f=>f.id===id)||{}).label||id).filter(Boolean);
  return labels.join(' / ');
}

function getMuscleLabel(ex){
  const primary=(ex.muscle||'').trim();
  const secondary=(ex.muscleSecondary||'').trim();
  if(primary && secondary && primary!==secondary) return `${primary} / ${secondary}`;
  return primary||secondary||'';
}

function filterExercises(list,{query='',typeFilter='',contextFilter=''}={}){
  const q=(query||'').trim().toLowerCase();
  return list.filter(e=>{
    const typeOk=!typeFilter || e.type===typeFilter;
    const contexts=getExerciseContexts(e);
    const contextOk=!contextFilter || contexts.includes(contextFilter);
    const text=`${e.name} ${e.muscle||''} ${e.muscleSecondary||''} ${TYPE_MAP[e.type]||e.type} ${contexts.join(' ')}`.toLowerCase();
    const searchOk=!q || text.includes(q);
    return typeOk&&contextOk&&searchOk;
  });
}

function buildFilterRow(filters,activeId,counts,onClickName){
  return filters.map(f=>{
    const count=counts[f.id]||0;
    return `<button class="fchip${activeId===f.id?' on':''}" onclick="${onClickName}('${f.id}')">${f.label} ${count}</button>`;
  }).join('');
}

function renderAddOpts(){
  const q=document.getElementById('add-search').value.toLowerCase().trim();
  renderAddFilters();
  const all=getAllExercises();
  const filtered=filterExercises(all,{query:q,typeFilter:addFilter,contextFilter:addContextFilter});

  // group by type then muscle
  const grouped={};
  filtered.forEach(e=>{
    const context=getExerciseContext(e);
    const muscleLabel=getMuscleLabel(e);
    const key=`${e.type}|||${context}|||${muscleLabel}`;
    if(!grouped[key]) grouped[key]={type:e.type,context,muscle:muscleLabel,items:[]};
    grouped[key].items.push(e);
  });

  let html='';
  let idx=0;
  window._opts=[];

  // Sort: warm first, then alphabetically by type
  const typeOrder=['warm','push','pull','legs','combo','free'];
  const sortedKeys=Object.keys(grouped).sort((a,b)=>{
    const [ta]=a.split('|||');const [tb]=b.split('|||');
    return typeOrder.indexOf(ta)-typeOrder.indexOf(tb);
  });

  sortedKeys.forEach(key=>{
    const g=grouped[key];
    const contextLabel=(CONTEXT_FILTERS.find(f=>f.id===g.context)||{}).label||g.context;
    html+=`<div class="opts-grp-label">${TYPE_MAP[g.type]||g.type}${g.muscle?' - '+g.muscle:''}${g.context?' · '+contextLabel:''}</div>`;
    g.items.forEach(e=>{
      const p=pending.find(x=>x.name===e.name);
      const sel=!!p;
      const img=e.imageData||e.imageUrl;
      window._opts[idx]={name:e.name,type:e.type};
      html+=`<div class="opt-row${sel?' on':''}" id="opt${idx}" onclick="toggleOpt(${idx},event)">
        <div class="opt-check"></div>
        <div class="opt-thumb thumb-tap" onclick="event.stopPropagation();openImageZoom(decodeURIComponent('${encodeURIComponent(img||'')}'))">${img?`<img src="${img}" onerror="this.onerror=null;this.parentElement.innerHTML='&lt;span class=&quot;thumb-ph&quot;&gt;&lt;/span&gt;'">`:getTypeEmoji(e.type)}</div>
        <span class="opt-name">${e.name}</span>
        <div class="opt-inputs" onclick="event.stopPropagation()">
          <input type="number" placeholder="s" value="${p?p.sets:''}" min="1" max="20" inputmode="numeric"
            oninput="updPend(${idx},'sets',this.value)">
          <span class="sep">x</span>
          <input class="ri" type="text" placeholder="reps" value="${p?p.reps:''}"
            oninput="updPend(${idx},'reps',this.value)">
          <select onchange="updPend(${idx},'unit',this.value)">
            <option value="rep"${p&&p.unit==='rep'?' selected':''}>rep</option>
            <option value="seg"${p&&p.unit==='seg'?' selected':''}>seg</option>
          </select>
        </div>
      </div>`;
      idx++;
    });
  });

  // "Create exercise" option if no exact match
  if(q&&!all.find(e=>e.name.toLowerCase()===q)){
    html+=`<div style="padding:12px 16px;border-top:1px solid var(--b0)">
      <button style="width:100%;padding:10px;background:var(--s2);border:1px dashed var(--b2);border-radius:var(--rs);color:var(--tx2);font-size:13px" onclick="openCreateFromSearch('${q.replace(/'/g,"\\'")}')">
        + Crear ejercicio "${q}"
      </button>
    </div>`;
  }

  document.getElementById('add-opts').innerHTML=html||`<div style="padding:24px;text-align:center;color:var(--tx3);font-size:13px">Sin resultados</div>`;
}

function toggleOpt(idx,e){
  if(e&&(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')) return;
  const o=window._opts[idx];if(!o) return;
  const i=pending.findIndex(x=>x.name===o.name);
  if(i>=0) pending.splice(i,1);
  else pending.push({name:o.name,type:o.type,sets:'',reps:'',unit:'rep'});
  updateAddBar();
  const el=document.getElementById('opt'+idx);
  if(el) el.classList.toggle('on',pending.some(x=>x.name===o.name));
}

function updPend(idx,field,val){
  const o=window._opts[idx];if(!o) return;
  let p=pending.find(x=>x.name===o.name);
  if(!p){p={name:o.name,type:o.type,sets:'',reps:'',unit:'rep'};pending.push(p);}
  p[field]=val;
  const el=document.getElementById('opt'+idx);
  if(el&&!el.classList.contains('on')) el.classList.add('on');
  updateAddBar();
}

function updateAddBar(){
  const n=pending.length;
  document.getElementById('n-sel').textContent=n?`${n} selec.`:'';
  document.getElementById('btn-add-confirm').disabled=!n;
}

function confirmAdd(){

    pending.forEach(p=>{rePending.push({name:p.name,type:p.type,sets:p.sets,reps:p.reps,unit:p.unit,superGroup:sg});});

    });
    sbSave();renderDay();closeSheet('add-sheet');
  }
}

function openDetail(di,i){

  detailPlan={
    sets:(parseInt(ex.sets||0,10)||'').toString(),
    reps:(ex.reps||'').toString(),
    unit:ex.unit||'rep'
  };
  const snapshot=getLatestSetSnapshot(ex);
  const targetSets=Math.min(Math.max(parseInt(ex.sets||0,10)||1,1),5);
  if(snapshot&&snapshot.sets&&snapshot.sets.length){

  } else {
    detailSets=Array.from({length:targetSets},()=>({val:'',unit:ex.unit||'rep',weight:'',wunit:'kg'}));
  }

  const hasSG=!!ex.superGroup;
  const detailImgHtml = img
    ? `<img src="${img}" onclick="event.stopPropagation();openImageZoom('${img.replace(/'/g,"\\'")}')" onerror="this.parentElement.innerHTML='&lt;span class=&quot;detail-img-ph&quot;&gt;${ex.name}&lt;/span&gt;'">`
    : `<span class="detail-img-ph">${ex.name}</span>`;

function renderDetailSets(){
  document.getElementById('detail-sets-list').innerHTML=detailSets.map((s,i)=>`
    <div class="set-row">
      <span class="set-num">Set ${i+1}</span>
      <input type="number" placeholder="valor" value="${s.val||''}" min="0" inputmode="numeric" oninput="detailSets[${i}].val=this.value">
      <select class="set-unit" onchange="detailSets[${i}].unit=this.value">
        <option value="rep"${s.unit==='rep'?' selected':''}>reps</option>
        <option value="seg"${s.unit==='seg'?' selected':''}>seg</option>
        <option value="cant"${s.unit==='cant'?' selected':''}>cant</option>
      </select>
      <input type="number" placeholder="kg" value="${s.weight||''}" min="0" step="0.5" inputmode="decimal" oninput="detailSets[${i}].weight=this.value">
      <select class="set-unit" onchange="detailSets[${i}].wunit=this.value">
        <option value="kg"${s.wunit==='kg'?' selected':''}>kg</option>
        <option value="seg"${s.wunit==='seg'?' selected':''}>seg</option>
        <option value="cant"${s.wunit==='cant'?' selected':''}>cant</option>
      </select>
      ${detailSets.length>1?`<button class="set-del" onclick="detailSets.splice(${i},1);renderDetailSets()">x</button>`:'<span style="width:22px"></span>'}
    </div>`).join('');
}

function addDetailSet(){
  if(detailSets.length>=5) return;
  const prev=detailSets[detailSets.length-1]||{val:'',unit:'rep',weight:'',wunit:'kg'};
  detailSets.push({val:'',unit:prev.unit,weight:'',wunit:prev.wunit});
  renderDetailSets();
}

function saveDetail(){
  const{dayIdx,exIdx}=detailCtx;
  const ex=(weekData[dayIdx]||[])[exIdx];if(!ex) return;
  const plannedSets=Math.min(Math.max(parseInt(detailPlan.sets||0,10)||1,1),20);
  const plannedReps=(detailPlan.reps||'').toString().trim();
  const plannedUnit=detailPlan.unit||'rep';
  const cleaned=detailSets.slice(0,5).map(s=>({
    val:(s.val??'').toString().trim(),
    unit:s.unit||plannedUnit,
    weight:(s.weight??'').toString().trim(),
    wunit:s.wunit||'kg'
  }));
  ex.sets=plannedSets;
  ex.reps=plannedReps;
  ex.unit=plannedUnit;
  if(!ex.logs) ex.logs=[];
  const todayIdx=ex.logs.findIndex(l=>l.date===today());
  const payload={date:today(),sets:cleaned};
  if(todayIdx>=0) ex.logs[todayIdx]=payload;
  else ex.logs.push(payload);
  sbSave();renderDay();closeSheet('detail-sheet');
}

function separateFromSuper(di,i){
  const ex=(weekData[di]||[])[i];
  if(ex){
    ex.superGroup=null;
    normalizeSupersets(di);
    pendingSuperLink=null;
    sbSave();renderDay();closeSheet('detail-sheet');
  }
}

function toggleSecondaryModality(forceOpen=null){

  const btn=document.getElementById('ee-modality-secondary-toggle');
  const shouldOpen=forceOpen===null ? wrap.style.display==='none' : !!forceOpen;
  wrap.style.display=shouldOpen?'flex':'none';
  btn.classList.toggle('open',shouldOpen);
  btn.textContent=shouldOpen?'Quitar segunda modalidad':'Agregar segunda modalidad';
  if(!shouldOpen) document.getElementById('ee-modality-secondary').value='';
}

function refreshMuscleOptions(selected='',selectedSecondary=''){
  const builtInMuscles=[];
  Object.values(BUILTIN).forEach(groups=>Object.keys(groups).forEach(m=>builtInMuscles.push(m)));
  const customMuscles=exercises.flatMap(e=>[e.muscle,e.muscleSecondary]).filter(Boolean);
  const raw=[...BASE_MUSCLE_OPTIONS,...builtInMuscles,...customMuscles].map(m=>(m||'').trim()).filter(Boolean);
  const normalize=v=>v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  const canonicalize=v=>{
    const k=normalize(v);
    const map={
      'triceps':'Triceps',
      'biceps':'Biceps',
      'espalda':'Espalda',
      'pecho':'Pecho',
      'hombros':'Hombros',
      'core':'Core',
      'cuadriceps':'Cuadriceps',
      'isquiotibiales':'Isquiotibiales',
      'gluteos':'Gluteos',
      'pantorrillas':'Pantorrillas',
    };
    return map[k]||v;
  };
  const byKey={};
  raw.forEach(m=>{
    const c=canonicalize(m);
    const k=normalize(c);
    if(!byKey[k]) byKey[k]=c;
  });
  const all=Object.values(byKey).sort((a,b)=>a.localeCompare(b,'es'));
  const ensureOption=value=>{
    const current=(value||'').trim();
    if(!current) return;
    const ck=normalize(canonicalize(current));
    if(!byKey[ck]) all.push(canonicalize(current));
  };
  ensureOption(selected);
  ensureOption(selectedSecondary);
  const options=['<option value="">Seleccionar...</option>',...all.map(m=>`<option value="${m}">${m}</option>`)].join('');
  const primary=document.getElementById('ee-muscle');
  const secondary=document.getElementById('ee-muscle-secondary');
  const currentPrimary=(selected||primary.value||'').trim();
  const currentSecondary=(selectedSecondary||secondary.value||'').trim();
  primary.innerHTML=options;
  secondary.innerHTML=['<option value="">Sin segundo grupo</option>',...all.map(m=>`<option value="${m}">${m}</option>`)].join('');
  if(currentPrimary) primary.value=canonicalize(currentPrimary);
  if(currentSecondary) secondary.value=canonicalize(currentSecondary);
  toggleSecondaryMuscle(!!currentSecondary);
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=()=>reject(new Error('file'));
    reader.readAsDataURL(file);
  });
}

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('image'));
    img.src=src;
  });
}

async function compressImageDataURL(dataUrl,maxSide=IMG_MAX_SIDE,quality=IMG_QUALITY){
  const img=await loadImage(dataUrl);
  const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
  const w=Math.max(1,Math.round(img.width*scale));
  const h=Math.max(1,Math.round(img.height*scale));
  const canvas=document.createElement('canvas');
  canvas.width=w;
  canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,0,0,w,h);
  let out=canvas.toDataURL('image/jpeg',quality);
  if(out.length>IMG_MAX_BYTES){
    out=canvas.toDataURL('image/jpeg',0.7);
  }
  return out;
}

function handleEEFile(input){
  const file=input.files[0];if(!file) return;
  readFileAsDataURL(file)
    .then(src=>compressImageDataURL(src))
    .then(comp=>{
      eeImgData=comp;
      document.getElementById('ee-img-preview').innerHTML=`<img src="${eeImgData}" style="width:100%;height:100%;object-fit:cover">`;
      document.getElementById('ee-img-url').value='';
      if((eeImgData||'').length>IMG_MAX_BYTES) toast('imagen pesada, se comprimio para sincronizar',false);
    })
    .catch(()=>toast('no pude procesar la imagen',false));
}

function saveExercise(){
  const name=document.getElementById('ee-name').value.trim();
  if(!name){toast('Ingresa un nombre',false);return;}
  const type=document.getElementById('ee-type').value;
  const modality=document.getElementById('ee-modality').value;
  const rawModalitySecondary=document.getElementById('ee-modality-secondary').value;
  const modalitySecondary=(rawModalitySecondary && rawModalitySecondary!==modality)?rawModalitySecondary:'';
  const muscle=document.getElementById('ee-muscle').value.trim();
  const rawSecondary=document.getElementById('ee-muscle-secondary').value.trim();
  const muscleSecondary=(rawSecondary && rawSecondary!==muscle)? rawSecondary : '';
  const rawImageUrl=document.getElementById('ee-img-url').value.trim();
  let imageUrl=rawImageUrl||null;
  let imageData=eeImgData||null;

  if(eeCtx.id){
    const ex=exercises.find(e=>e.id===eeCtx.id);
    if(ex){
      if(!rawImageUrl && !eeImgData){
        imageUrl=ex.imageUrl||null;
        imageData=ex.imageData||null;
      } else if(rawImageUrl){
        imageData=null;
      }
      Object.assign(ex,{name,type,muscle,muscleSecondary,modality,modalitySecondary,imageUrl,imageData});
    }
  } else {
    const existing=exercises.find(e=>!e.hidden && e.name.toLowerCase()===name.toLowerCase());
    if(existing){
      if(!rawImageUrl && !eeImgData){
        imageUrl=existing.imageUrl||null;
        imageData=existing.imageData||null;
      } else if(rawImageUrl){
        imageData=null;
      }
      Object.assign(existing,{name,type,muscle,muscleSecondary,modality,modalitySecondary,imageUrl,imageData,replaceOf:existing.replaceOf||null,hidden:false});
    } else {
      const src=eeCtx.sourceName||null;
      const replaceOf=(src && src!==name)?src:null;
      exercises.push({id:'ex_'+Date.now(),name,type,muscle,muscleSecondary,modality,modalitySecondary,imageUrl,imageData,replaceOf,hidden:false});
    }
  }
  refreshMuscleOptions();
  sbSave();
  closeSheet('ex-edit-sheet');
  renderMgmt();
  renderDay();
  if(eeReturnToAdd){
    eeReturnToAdd=false;
    document.getElementById('add-search').value=name;
    pending=[{name,type,sets:'',reps:'',unit:'rep'}];
    renderAddFilters();
    renderAddOpts();
    updateAddBar();
    openSheet('add-sheet');
  } else if(document.getElementById('add-sheet').classList.contains('on')){
    renderAddOpts();
  }
}

function deleteExercise(){
  if(!confirm('Eliminar ejercicio?')) return;
  if(eeCtx.id){
    exercises=exercises.filter(e=>e.id!==eeCtx.id);
  }else if(eeCtx.sourceName){
    const sourceName=eeCtx.sourceName;
    const srcType=eeCtx.sourceType||'free';
    const srcMuscle=eeCtx.sourceMuscle||'';
    const srcModality=eeCtx.sourceModality||'';
    const existingHidden=exercises.find(e=>e.hidden && e.name===sourceName);
    if(existingHidden){
      Object.assign(existingHidden,{hidden:true,type:srcType,muscle:srcMuscle,modality:srcModality,modalitySecondary:'',imageUrl:null,imageData:null,replaceOf:null});
    }else{
      exercises.push({id:'ex_'+Date.now(),name:sourceName,type:srcType,muscle:srcMuscle,modality:srcModality,modalitySecondary:'',imageUrl:null,imageData:null,hidden:true,replaceOf:null});
    }
    exercises=exercises.filter(e=>e.replaceOf!==sourceName);
  }else{
    return;
  }
  sbSave();closeSheet('ex-edit-sheet');renderMgmt();renderDay();
}

(async()=>{
  lsLoad();
  const bootNamesChanged=normalizeAllExerciseNames();
  const bootModalitiesChanged=normalizeAllExerciseModalities();
  if(bootNamesChanged || bootModalitiesChanged) lsSave();
  renderDayRow();
  renderDay();

  refreshFromRemote({force:true});

  sbEnsure();
  if(syncState.pending) scheduleSync(1200);
  syncState.pullTimer=setInterval(()=>{
    if(document.visibilityState==='visible') refreshFromRemote();
  },SYNC_PULL_MS);

  window.addEventListener('online',()=>{
    refreshFromRemote({force:true});
    if(syncState.pending) scheduleSync(700);
  });
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden' && syncState.pending) flushSync({keepalive:true});
    if(document.visibilityState==='visible') refreshFromRemote({force:true});
  });
  window.addEventListener('pagehide',()=>{ if(syncState.pending) flushSync({keepalive:true}); });
})();
